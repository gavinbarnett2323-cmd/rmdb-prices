# GitHub Actions price relay — drop this at .github/workflows/prices.yml in the host repo.
# Runs on GitHub's servers (real internet egress, free), fetches batched free EOD prices, commits prices.json.
# The Claude price-sweep task then web_fetches the raw prices.json (one static read) — no FMP, no keys, ~zero usage.
name: price-relay
on:
  schedule:
    - cron: "30 21 * * 1-5"   # ~21:30 UTC weekdays = shortly after the US cash close (16:30 ET EDT). Adjust for DST if you like.
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab
permissions:
  contents: write              # allow the workflow to commit prices.json back (uses the built-in GITHUB_TOKEN, no PAT)
concurrency:
  group: price-relay
  cancel-in-progress: false
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Fetch prices (Stooq + Yahoo, batched, no key)
        run: python3 relay/fetch_prices.py
      - name: Commit prices.json
        run: |
          git config user.name  "price-relay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add relay/prices.json
          git diff --staged --quiet || git commit -m "prices $(date -u +%F\ %H:%M)"
          git push
